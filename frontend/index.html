<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjay's AI Persona</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .chat-header {
            padding: 20px;
            background: #334155;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 1px solid #475569;
        }
        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .user-message {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .ai-message {
            background: #475569;
            color: #f8fafc;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .chat-input-area {
            display: flex;
            padding: 16px;
            background: #1e293b;
            border-top: 1px solid #475569;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            border-radius: 6px;
            outline: none;
        }
        button {
            margin-left: 12px;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Sanjay's AI Representative
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="message ai-message">Hi! I'm Sanjay's AI representative. I can answer questions about his background, skills, or help you book an interview with him. How can I help you today?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        inputField.value = '';

        // Add a loading message
        const loadingId = addMessage('Thinking...', 'ai');

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            // Remove loading message
            document.getElementById(loadingId).remove();
            
            addMessage(data.response || 'Error getting response', 'ai');
        } catch (error) {
            document.getElementById(loadingId).remove();
            addMessage('Failed to connect to server.', 'ai');
        }
    }

    function addMessage(text, sender) {
        const messagesDiv = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-message`;
        msgDiv.textContent = text;
        const id = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        msgDiv.id = id;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return id;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
